# Security CI pipeline (Layer 3 enforcement)
# Reference: ~/.claude/SECURITY.md → ENFORCEMENT LAYERS

name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"   # Weekly scan on Mondays

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # Secret scanning — block PR если любой secret найден в истории
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SAST — semantic static analysis
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/python
            p/react

  # CodeQL — GitHub native SAST
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]   # adjust per project
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3

  # Dependency audit — block HIGH+ vulns
  deps-node:
    name: npm audit
    runs-on: ubuntu-latest
    if: hashFiles('package-lock.json') != '' || hashFiles('pnpm-lock.yaml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm audit --audit-level=high

  deps-python:
    name: pip-audit
    runs-on: ubuntu-latest
    if: hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '' || hashFiles('poetry.lock') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pip-audit
          pip-audit --strict

  # Container scan — если есть Dockerfile
  trivy:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t app:ci .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: app:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  # SBOM generation — для supply chain transparency
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: "sbom.spdx.json"
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # License compliance — предотвращает GPL в proprietary code
  licenses:
    name: License check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fossas/fossa-action@main
        if: env.FOSSA_API_KEY != ''
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

  # Infrastructure as Code scan
  iac:
    name: IaC scan (Checkov)
    runs-on: ubuntu-latest
    if: hashFiles('**/*.tf') != '' || hashFiles('**/Dockerfile') != '' || hashFiles('**/docker-compose*.yml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@master
        with:
          output_format: sarif
          output_file_path: checkov.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
